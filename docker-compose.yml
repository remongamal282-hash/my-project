version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: my-project-app
    working_dir: /var/www
    volumes:
      - ./:/var/www
    environment:
      APP_ENV: local
      APP_DEBUG: 'true'
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: my_project
      DB_USERNAME: root
      DB_PASSWORD: ''
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - my-project-net

  nginx:
    image: nginx:1.27-alpine
    container_name: my-project-nginx
    ports:
      - '8000:80'
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - my-project-net

  mysql:
    image: mysql:8.4
    container_name: my-project-mysql
    ports:
      - '3307:3306'
    environment:
      MYSQL_DATABASE: my_project
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - my-project-net

volumes:
  mysql_data:

networks:
  my-project-net:
    driver: bridge
